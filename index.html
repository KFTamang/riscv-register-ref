<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RVRF — RISC-V Register Reference</title>
  <meta name="description" content="Interactive RISC-V Control and Status Register (CSR) reference. Look up any CSR by name or address, decode register values into named bit fields, and view privilege levels and access types — based on the RISC-V Privileged ISA Specification v1.13." />
  <meta name="keywords" content="RISC-V, CSR, control status register, mstatus, sstatus, satp, mtvec, PMP, RISC-V reference, register decoder" />
  <meta name="robots" content="index, follow" />

  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://kftamang.github.io/riscv-register-ref" />
  <meta property="og:title"       content="RVRF — RISC-V Register Reference" />
  <meta property="og:description" content="Interactive RISC-V CSR reference: look up registers by name or address, decode values into bit fields, and view privilege and access metadata." />

  <meta name="twitter:card"        content="summary" />
  <meta name="twitter:title"       content="RVRF — RISC-V Register Reference" />
  <meta name="twitter:description" content="Interactive RISC-V CSR reference: look up registers by name or address, decode values into bit fields, and view privilege and access metadata." />

  <link rel="canonical" href="https://kftamang.github.io/riscv-register-ref" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-VSQQ2718YQ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-VSQQ2718YQ');
  </script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>RVRF</h1>
    <p class="subtitle">RISC-V Register Reference</p>
  </header>

  <main>
    <section class="inputs">
      <div class="input-group" id="reg-group">
        <label for="reg-input">Register</label>
        <div class="autocomplete-wrapper">
          <input
            id="reg-input"
            type="text"
            autocomplete="off"
            spellcheck="false"
            placeholder="e.g. mstatus"
            aria-label="CSR name"
            aria-autocomplete="list"
            aria-controls="reg-dropdown"
          />
          <ul id="reg-dropdown" class="dropdown" role="listbox" hidden></ul>
        </div>
      </div>

      <div class="input-group">
        <label for="val-input">Value</label>
        <input
          id="val-input"
          type="text"
          autocomplete="off"
          spellcheck="false"
          placeholder="0x0000000000000000"
          aria-label="Register value (hex or decimal)"
        />
      </div>
    </section>

    <section id="reg-info" hidden>
      <div class="reg-header">
        <div>
          <h2 id="reg-title"></h2>
          <div class="reg-badges">
            <span id="reg-priv-badge" class="priv-badge"></span>
            <span id="reg-access-badge" class="access-badge"></span>
            <span id="reg-addr-badge" class="addr-badge"></span>
          </div>
          <p id="reg-desc" class="reg-desc"></p>
        </div>
        <a id="reg-link" href="#" target="_blank" rel="noopener" class="spec-link">
          Spec ↗
        </a>
      </div>

      <div class="table-wrapper">
        <table id="fields-table">
          <thead>
            <tr>
              <th>Bits</th>
              <th>Field</th>
              <th>Type</th>
              <th>Value</th>
              <th>Meaning</th>
            </tr>
          </thead>
          <tbody id="fields-body"></tbody>
        </table>
      </div>
    </section>

    <p id="no-data-msg" class="notice" hidden>
      Register data not loaded. Run <code>python3 scripts/gen_data.py</code> to generate
      <code>data/registers.json</code>, then serve this directory over HTTP.
    </p>

    <p id="loading-msg" class="notice">Loading register data…</p>

    <p id="profile-disclaimer" class="disclaimer"></p>
  </main>

  <script src="app.js"></script>
</body>
</html>
